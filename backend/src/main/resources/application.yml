server:
  port: ${PORT:8081}

spring:
  application:
    name: toxic-wrapped-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ml-service:
  base-url: ${ML_SERVICE_URL:http://localhost:8000}
  timeout: ${ML_SERVICE_TIMEOUT:30}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT:20}

logging:
  level:
    root: INFO
    com.toxicwrapped: ${LOG_LEVEL:DEBUG}


# Actuator - Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:never}
  info:
    env:
      enabled: true

info:
  app:
    name: toxic-wrapped-backend
    version: 1.0.0
    description: WhatsApp Chat Analyzer