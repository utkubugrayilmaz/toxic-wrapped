server:
  port: 8081

spring:
  application:
    name: toxic-wrapped-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ML Service bağlantısı
ml-service:
  base-url: http://localhost:8000
  timeout: 30

# Logging
logging:
  level:
    root: INFO
    com.toxicwrapped: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"